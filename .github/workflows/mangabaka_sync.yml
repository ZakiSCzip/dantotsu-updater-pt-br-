name: Sync AniList to MangaBaka

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      session_token:
        description: '__Secure-better-auth.session_token (from browser if auto fails)'
        required: false
      cf_clearance:
        description: 'cf_clearance cookie (from browser if auto fails)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Puppeteer and dependencies
        run: |
          npm install puppeteer
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgbm1 \
            libgcc1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            wget \
            xdg-utils

      - name: Create browser automation script
        run: |
          cat > mangabaka_auth.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs').promises;
          
          (async () => {
            console.log('Launching browser...');
            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-accelerated-2d-canvas',
                '--disable-gpu',
                '--window-size=1920,1080',
                '--disable-blink-features=AutomationControlled',
                '--disable-features=IsolateOrigins,site-per-process'
              ]
            });
            
            const page = await browser.newPage();
            
            // Stealth: Remove webdriver property
            await page.evaluateOnNewDocument(() => {
              delete navigator.__proto__.webdriver;
              Object.defineProperty(navigator, 'webdriver', {
                get: () => undefined,
                configurable: true
              });
            });
            
            // Set realistic user agent and viewport
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
            await page.setViewport({ width: 1920, height: 1080 });
            
            // Set extra headers
            await page.setExtraHTTPHeaders({
              'Accept-Language': 'en-US,en;q=0.9',
              'Accept-Encoding': 'gzip, deflate, br'
            });
            
            let cookies = null;
            
            try {
              console.log('Navigating to MangaBaka...');
              await page.goto('https://mangabaka.org/', {
                waitUntil: 'networkidle2',
                timeout: 60000
              });
              
              console.log('Waiting for Cloudflare challenge to complete...');
              // Wait for potential Cloudflare challenge
              await page.waitForFunction(
                () => {
                  return !document.body.innerHTML.includes('Checking your browser') && 
                         !document.body.innerHTML.includes('cf-challenge');
                },
                { timeout: 120000 }
              ).catch(() => console.log('No Cloudflare challenge detected or already passed'));
              
              // Additional wait for any redirects
              await new Promise(resolve => setTimeout(resolve, 5000));
              
              // Navigate to the import page
              console.log('Navigating to import page...');
              await page.goto('https://mangabaka.org/my/library/import/anilist', {
                waitUntil: 'networkidle2',
                timeout: 30000
              });
              
              // Get all cookies
              cookies = await page.cookies();
              
              const sessionCookie = cookies.find(c => c.name === '__Secure-better-auth.session_token');
              const cfCookie = cookies.find(c => c.name === 'cf_clearance');
              
              if (sessionCookie && cfCookie) {
                console.log('✅ Successfully obtained cookies!');
                console.log(`Session token: ${sessionCookie.value.substring(0, 20)}...`);
                console.log(`CF Clearance: ${cfCookie.value.substring(0, 20)}...`);
                
                // Save to file for the workflow
                const cookieData = {
                  session_token: sessionCookie.value,
                  cf_clearance: cfCookie.value,
                  fetched_at: new Date().toISOString()
                };
                
                await fs.writeFile('mangabaka_cookies.json', JSON.stringify(cookieData, null, 2));
                
                // Also output for GitHub env
                console.log(`::set-output name=session_token::${sessionCookie.value}`);
                console.log(`::set-output name=cf_clearance::${cfCookie.value}`);
              } else {
                console.error('❌ Failed to get required cookies');
                if (!sessionCookie) console.error('Missing __Secure-better-auth.session_token');
                if (!cfCookie) console.error('Missing cf_clearance');
                
                // Save cookies for debugging
                await fs.writeFile('debug_cookies.json', JSON.stringify(cookies, null, 2));
                throw new Error('Cookie extraction failed');
              }
              
            } catch (error) {
              console.error('Error:', error.message);
              
              // Save screenshot for debugging
              await page.screenshot({ path: 'error_screenshot.png', fullPage: true });
              console.log('Saved error screenshot');
              
              throw error;
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Run browser automation
        id: get_cookies
        run: node mangabaka_auth.js
        continue-on-error: true

      - name: Use manual cookies if automation failed
        if: failure() || steps.get_cookies.outputs.session_token == ''
        run: |
          echo "Using manually provided cookies..."
          echo "::set-output name=session_token::${{ github.event.inputs.session_token || secrets.MANGABAKA_SESSION }}"
          echo "::set-output name=cf_clearance::${{ github.event.inputs.cf_clearance || secrets.MANGABAKA_CF_CLEARANCE }}"
        id: manual_cookies

      - name: Fetch AniList manga list
        id: fetch
        run: |
          RESPONSE=$(curl -s -X POST https://graphql.anilist.co \
            -H "Content-Type: application/json" \
            --data '{
              "query": "query($userName: String){MediaListCollection(userName: $userName, type: MANGA){lists{entries{mediaId status score(format: POINT_100) progress progressVolumes startedAt{year month day} completedAt{year month day} repeat notes private}}}}",
              "variables": {"userName": "itsmechinmoy"}
            }')
          echo "ANILIST_DATA=$RESPONSE" >> $GITHUB_ENV

      - name: Import to MangaBaka
        run: |
          SESSION="${{ steps.manual_cookies.outputs.session_token }}"
          CF="${{ steps.manual_cookies.outputs.cf_clearance }}"
          
          if [ -z "$SESSION" ] || [ -z "$CF" ]; then
            echo "❌ Missing required cookies!"
            exit 1
          fi
          
          # Fetch the payload template from the import page
          IMPORT_RESPONSE=$(curl -s -X POST "https://mangabaka.org/_app/remote/15bgtxk/importLibraryCommand" \
            -H "Content-Type: application/json" \
            -H "Origin: https://mangabaka.org" \
            -H "Referer: https://mangabaka.org/my/library/import/anilist" \
            -H "x-sveltekit-pathname: /my/library/import/anilist" \
            -H "x-sveltekit-search: " \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:151.0) Gecko/20100101 Firefox/151.0" \
            -H "Sec-Fetch-Dest: empty" \
            -H "Sec-Fetch-Mode: cors" \
            -H "Sec-Fetch-Site: same-origin" \
            -b "__Secure-better-auth.session_token=${SESSION}; cf_clearance=${CF}; content_rating=safe,pornographic; show_discord_banner=no" \
            --data "$ANILIST_DATA")
          
          echo "Import response: $IMPORT_RESPONSE"
          
          # Check if successful
          if echo "$IMPORT_RESPONSE" | grep -q '"type":"result"'; then
            echo "✅ Import successful!"
          else
            echo "⚠️ Import may have failed. Check the response."
          fi

      - name: Update secrets if new cookies were obtained
        if: success() && steps.get_cookies.outputs.session_token != ''
        run: |
          # This requires GitHub API token with repo scope
          # You'd need to use GitHub's API to update secrets, but that's complex
          # Alternative: Store in a file in the repo (not secure!)
          
          # For security, let's just log that new cookies were obtained
          echo "✅ New cookies obtained. Update your GitHub secrets manually or use a secure storage solution."
          echo "Session token: ${{ steps.get_cookies.outputs.session_token }}"
          echo "CF clearance: ${{ steps.get_cookies.outputs.cf_clearance }}"

      - name: Upload artifacts for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mangabaka-debug
          path: |
            *.json
            *.png
          retention-days: 1
