name: Build and Release Dantotsu (pt-BR)

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 * * * *" # Roda de hora em hora
  workflow_dispatch:

env:
  # Espelho PÚBLICO do Dantotsu oficial (rebelonion/Dantotsu, branch dev).
  # É atualizado de hora em hora a partir do Forgejo oficial.
  # Troque por outro espelho/branch aqui se necessário.
  MIRROR_REPO: "https://github.com/itsmechinmoy/Dantotsu.git"
  MIRROR_BRANCH: "main"
  # Repositório oficial (apenas para os links do changelog).
  UPSTREAM_WEB: "https://git.rebelonion.dev/rebelonion/Dantotsu"
  # Flavor sem Firebase/Google Services.
  BUILD_FLAVOR: "fdroid"

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      SHOULD_RUN: ${{ steps.compare.outputs.SHOULD_RUN }}
      LATEST_SHA: ${{ steps.compare.outputs.LATEST_SHA }}
      LAST_SHA: ${{ steps.compare.outputs.LAST_SHA }}
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Clonar o espelho público do Dantotsu
        run: git clone --depth 1 --branch "$MIRROR_BRANCH" "$MIRROR_REPO" dantotsu

      - name: Baixar o último SHA do release mais recente deste repositório
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo "$GITHUB_REPOSITORY" --pattern "last_sha.txt" --dir . || echo "Nenhum last_sha.txt encontrado (primeira execução)."
        continue-on-error: true

      - name: Comparar SHAs
        id: compare
        run: |
          LATEST_SHA=$(git -C dantotsu rev-parse HEAD)
          echo "LATEST_SHA=${LATEST_SHA}" >> $GITHUB_OUTPUT
          if [ -f last_sha.txt ]; then
            LAST_SHA=$(cat last_sha.txt)
          else
            LAST_SHA=""
          fi
          echo "LAST_SHA=${LAST_SHA}" >> $GITHUB_OUTPUT
          echo "Último SHA construído: '${LAST_SHA}' | SHA atual do upstream: '${LATEST_SHA}'"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "$LATEST_SHA" != "$LAST_SHA" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Extrair versão
        if: steps.compare.outputs.SHOULD_RUN == 'true'
        id: version
        run: |
          VER=$(grep -E -o 'versionName = "[^"]*"' dantotsu/app/build.gradle.kts | cut -d'"' -f2)
          SHA=$(git -C dantotsu rev-parse HEAD)
          VERSION="${VER}+${SHA:0:7}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versão: $VERSION"

  build:
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.SHOULD_RUN == 'true'
    steps:
      - name: Checkout deste repositório (tradução + scripts)
        uses: actions/checkout@v4

      - name: Clonar o espelho público do Dantotsu
        run: |
          git clone --branch "$MIRROR_BRANCH" "$MIRROR_REPO" dantotsu
          # garante histórico suficiente para o changelog
          git -C dantotsu fetch --unshallow 2>/dev/null || true

      - name: Aplicar tradução pt-BR
        run: python3 scripts/apply_translation.py dantotsu

      - name: Gerar changelog
        id: commit-log
        run: |
          cd dantotsu
          LAST_SHA="${{ needs.check-updates.outputs.LAST_SHA }}"
          if [ -n "$LAST_SHA" ] && git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
            RANGE="${LAST_SHA}..HEAD"
          else
            RANGE="HEAD -n 10"
          fi
          COMMIT_LOGS=$(git log $RANGE --pretty=format:"● %s ~%an [↗](${UPSTREAM_WEB}/commit/%H)" 2>/dev/null || true)
          [ -z "$COMMIT_LOGS" ] && COMMIT_LOGS="● Sem novos commits desde o último release"
          cd "$GITHUB_WORKSPACE"
          {
            echo "Aplicativo Dantotsu traduzido para Português (Brasil)."
            echo ""
            echo "Mudanças do upstream desde o último build:"
            echo ""
            echo "$COMMIT_LOGS"
          } > changelog.txt

      - name: Corrigir toolchain do Kotlin
        run: |
          sed -i '/jvmToolchain/d' dantotsu/app/build.gradle.kts
          echo "org.gradle.java.installations.auto-download=false" >> dantotsu/gradle.properties


      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
          cache: gradle

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Adicionar configuração de Split APK
        run: |
          if ! grep -q "splits {" dantotsu/app/build.gradle.kts; then
            sed -i '/^android {/a\
                splits {\
                    abi {\
                        isEnable = true\
                        reset()\
                        include("armeabi-v7a", "arm64-v8a", "x86", "x86_64")\
                        isUniversalApk = true\
                    }\
                }' dantotsu/app/build.gradle.kts
          fi

      - name: Compilar e assinar o APK
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd dantotsu
          chmod +x ./gradlew
          FLAVOR_CAP="$(echo "${BUILD_FLAVOR}" | sed 's/.*/\u&/')"
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "Assinando com keystore fornecido via secrets."
            echo "$KEYSTORE_FILE" | base64 -d > "$GITHUB_WORKSPACE/key.keystore"
            ./gradlew "assemble${FLAVOR_CAP}Release" \
              -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/key.keystore" \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            echo "Nenhum keystore configurado; usando assinatura debug padrão."
            ./gradlew "assemble${FLAVOR_CAP}Release"
          fi

      - name: Gerar checksums
        run: |
          OUT="dantotsu/app/build/outputs/apk/${BUILD_FLAVOR}/release"
          {
            echo ""
            echo "---"
            echo "### Checksums (SHA-256)"
            echo ""
            echo "| Arquivo | SHA-256 |"
            echo "| ------- | ------- |"
            for apk in "$OUT"/*.apk; do
              [ -e "$apk" ] || continue
              SHA=$(sha256sum "$apk" | cut -d' ' -f1)
              echo "| $(basename "$apk") | $SHA |"
            done
          } >> changelog.txt

      - name: Salvar SHA para a próxima execução
        run: echo "${{ needs.check-updates.outputs.LATEST_SHA }}" > last_sha.txt

      - name: Remover tag/release anterior, se existir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-updates.outputs.VERSION }}"
          gh release delete "$TAG" -y --repo "$GITHUB_REPOSITORY" --cleanup-tag || true

      - name: Criar release neste repositório
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.check-updates.outputs.VERSION }}
          name: Dantotsu pt-BR v${{ needs.check-updates.outputs.VERSION }}
          bodyFile: changelog.txt
          artifacts: |
            dantotsu/app/build/outputs/apk/${{ env.BUILD_FLAVOR }}/release/*.apk
            last_sha.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: true

      - name: Upload dos APKs como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dantotsu-ptBR-APKs
          retention-days: 5
          compression-level: 9
          path: dantotsu/app/build/outputs/apk/${{ env.BUILD_FLAVOR }}/release/*.apk
